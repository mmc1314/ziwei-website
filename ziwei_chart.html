<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>紫微斗數命盤</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#D8B84A;--gold2:#F2D060;--bg:#FFFDF6;--bg2:#FFF9EA;
  --card:#fff;--text:#1E1432;--muted:#7A6A8A;
  --border:rgba(216,184,74,0.3);--accent:#7B3FB5;
  --lu:#1a7a3a;--quan:#1a3a7a;--ke:#6a1a9a;--ji:#b02020;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);padding:16px}
.page{max-width:980px;margin:0 auto}

/* FORM */
.form-section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;box-shadow:0 2px 16px rgba(216,184,74,0.08)}
.form-title{font-family:'Noto Serif TC',serif;font-size:17px;color:var(--gold);margin-bottom:18px;letter-spacing:2px}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
label{font-size:11px;color:var(--muted);letter-spacing:1px}
select,input{border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:'Noto Sans TC',sans-serif;background:var(--bg);outline:none;width:100%;transition:border-color .2s}
select:focus,input:focus{border-color:var(--gold)}
.cal-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.cal-btn{flex:1;padding:9px;font-size:12px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'Noto Sans TC',sans-serif;transition:all .2s}
.cal-btn.active{background:var(--gold);color:#fff;font-weight:600}
.btn-gen{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:'Noto Serif TC',serif;color:#fff;cursor:pointer;letter-spacing:2px;transition:all .3s;box-shadow:0 4px 16px rgba(216,184,74,0.3);margin-top:4px}
.btn-gen:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(216,184,74,0.4)}

/* CHART */
.chart-section{display:none}
.chart-section.show{display:block}
.chart-header{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;text-align:center;padding:10px 12px 12px;font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;letter-spacing:4px;border-radius:10px 10px 0 0;line-height:1.6}
.chart-wrap{border:2px solid var(--gold);border-radius:0 0 10px 10px;background:var(--card);overflow:hidden;box-shadow:0 4px 24px rgba(216,184,74,0.1)}

/* 4x4 GRID */
.mingpan{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,minmax(105px,auto))}
.palace{border:1px solid rgba(216,184,74,0.2);padding:5px 5px 18px 5px;min-height:105px;position:relative;background:var(--card);font-size:10px;display:flex;flex-direction:column}
.palace.ming-pal{background:#FFFBEE;border-color:var(--gold)}
.p-bottom{position:absolute;bottom:2px;left:0;right:0;display:flex;justify-content:space-between;padding:0 4px;font-size:9px}
.center-info{grid-column:2/4;grid-row:2/4;border:1px solid var(--gold);background:linear-gradient(135deg,#FFFBF0,#F5EEFF);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 12px;text-align:center}

/* 宮格內 */
.p-top{display:none}
.p-dz{font-size:10px;color:var(--muted)}
.p-name{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:1px}
.p-stars{display:flex;flex-wrap:wrap;gap:2px;min-height:18px}
.star{font-family:'Noto Serif TC',serif;font-size:12px;font-weight:700;color:var(--text)}
.star.lu{color:var(--lu)}.star.quan{color:var(--quan)}.star.ke{color:var(--ke)}.star.ji{color:var(--ji)}
.sh-badge{font-size:8px;vertical-align:super;margin-left:1px;padding:0 2px;border-radius:2px}
.sh-lu{background:rgba(26,122,58,.12);color:var(--lu)}
.sh-quan{background:rgba(26,58,122,.12);color:var(--quan)}
.sh-ke{background:rgba(106,26,154,.12);color:var(--ke)}
.sh-ji{background:rgba(176,32,32,.12);color:var(--ji)}
.p-sub{font-size:9px;color:var(--muted);line-height:1.5;margin-top:2px}
.p-dx{position:absolute;bottom:3px;right:4px;font-size:8px;color:#aaa;background:rgba(216,184,74,.08);padding:1px 3px;border-radius:2px}
.tag-ming{position:absolute;top:3px;right:3px;font-size:8px;background:var(--gold);color:#fff;padding:1px 4px;border-radius:3px}
.tag-shen{position:absolute;top:3px;right:3px;font-size:8px;background:var(--accent);color:#fff;padding:1px 4px;border-radius:3px}

/* 中央 */
.c-title{font-family:'Noto Serif TC',serif;font-size:12px;color:var(--gold);letter-spacing:3px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);width:100%}
.c-row{font-size:11px;color:var(--text);line-height:2.0;text-align:left;width:100%}
.c-row span{color:var(--muted);font-size:10px}
.c-ju{display:inline-block;background:rgba(216,184,74,.1);color:var(--gold);padding:1px 7px;border-radius:8px;font-size:9px;margin-left:4px}
.c-sihua{display:flex;gap:6px;margin-top:8px;justify-content:center;flex-wrap:wrap}
.sh-item{font-size:10px;padding:2px 7px;border-radius:8px}
.sh-item.lu{background:rgba(26,122,58,.1);color:var(--lu)}
.sh-item.quan{background:rgba(26,58,122,.1);color:var(--quan)}
.sh-item.ke{background:rgba(106,26,154,.1);color:var(--ke)}
.sh-item.ji{background:rgba(176,32,32,.1);color:var(--ji)}

/* INFO BAR */
.info-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px;text-align:center}
.info-card .lbl{font-size:10px;color:var(--muted);margin-bottom:2px}
.info-card .val{font-size:13px;font-weight:700;color:var(--text);font-family:'Noto Serif TC',serif}

/* DAXIAN */
.dx-section{margin-top:14px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px}
.dx-title{font-size:11px;color:var(--gold);letter-spacing:2px;margin-bottom:7px}
.dx-grid{display:flex;flex-wrap:wrap;gap:5px}
.dx-item{font-size:10px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:3px 8px;color:var(--text)}

/* READING */
.reading{margin-top:14px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.reading h3{font-family:'Noto Serif TC',serif;font-size:13px;color:var(--text);margin-bottom:8px}
.reading p{font-size:12px;color:var(--muted);line-height:1.8}
.reading-hl{background:rgba(216,184,74,.07);border-left:3px solid var(--gold);padding:7px 10px;border-radius:0 5px 5px 0;margin:7px 0;color:var(--text);font-size:11px;line-height:1.8}
.lock-box{margin-top:14px;background:linear-gradient(135deg,var(--bg2),#F5EEFF);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center}
.lock-box .icon{font-size:28px;margin-bottom:6px}
.lock-box h3{font-family:'Noto Serif TC',serif;font-size:14px;color:var(--text);margin-bottom:6px}
.lock-box p{font-size:11px;color:var(--muted);margin-bottom:12px}
.pricing-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;max-width:500px;margin:0 auto 14px}
.price-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center}
.price-item .pname{font-size:11px;color:var(--muted);margin-bottom:3px}
.price-item .pprice{font-size:14px;font-weight:700;color:var(--gold);font-family:'Noto Serif TC',serif}
.price-item .ptype{font-size:9px;color:var(--muted)}
.btn-up{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;border:none;padding:10px 24px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;letter-spacing:1px}

@media(max-width:600px){
  .form-grid{grid-template-columns:1fr 1fr}
  .palace{min-height:80px;padding:5px 4px}
  .info-bar{grid-template-columns:1fr 1fr}
  .pricing-grid{grid-template-columns:1fr}
}

/* Palace star table */
.palace-table{margin-top:14px;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.palace-table-title{font-family:'Noto Serif TC',serif;font-size:12px;color:var(--gold);letter-spacing:2px;padding:9px 12px 7px;border-bottom:1px solid var(--border)}
.pt-grid{display:grid;grid-template-columns:repeat(12,1fr);border-top:1px solid var(--border)}
@media(max-width:700px){.pt-grid{grid-template-columns:repeat(6,1fr)}}
.pt-header-row{display:grid;grid-template-columns:repeat(12,1fr)}
@media(max-width:700px){.pt-header-row{grid-template-columns:repeat(6,1fr)}}
.pt-cell{padding:8px 4px;border-right:1px solid var(--border2);border-bottom:1px solid var(--border2);text-align:center;min-height:36px;display:flex;align-items:center;justify-content:center}
.pt-cell:last-child{border-right:none}
.pt-pal-cell{padding:7px 4px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);text-align:center;background:linear-gradient(135deg,rgba(216,184,74,0.08),rgba(216,184,74,0.03))}
.pt-pal-cell:last-child{border-right:none}
.pt-pal{font-size:10px;color:var(--gold-dim,#8B6914);font-weight:700;letter-spacing:1px;font-family:'Noto Serif TC',serif}
.pt-star-name{font-size:12px;font-family:'Noto Serif TC',serif;color:var(--text);font-weight:700;padding:2px 0}
.pt-star-name.lu{color:var(--lu)}.pt-star-name.quan{color:var(--quan)}.pt-star-name.ke{color:var(--ke)}.pt-star-name.ji{color:var(--ji)}
.pt-star-tag{font-size:8px;vertical-align:super;margin-left:1px}
.pt-stars-col{display:flex;flex-direction:column;align-items:center;gap:2px;width:100%}
.pt-empty{color:var(--muted);font-size:16px;opacity:0.3}

/* Upsell section */
.upsell-section{margin-top:14px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.upsell-teaser{padding:16px 16px 14px;background:linear-gradient(135deg,#FFF9EE,#F5EEFF)}
.upsell-teaser-title{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:1px}
.upsell-teaser-text{font-size:12px;color:var(--muted);line-height:1.9;margin-bottom:10px}
.upsell-teaser-text strong{color:var(--text)}
.upsell-blur{filter:blur(3px);pointer-events:none;user-select:none;font-size:12px;color:var(--muted);line-height:1.8;padding:0 0 8px}
.upsell-cta{background:linear-gradient(135deg,#5B3A8C,#3D2060);padding:18px 16px;text-align:center}
.upsell-cta-title{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:700;color:var(--gold2);letter-spacing:2px;margin-bottom:4px}
.upsell-cta-sub{font-size:11px;color:rgba(255,255,255,0.65);margin-bottom:14px}
.upsell-price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;max-width:480px;margin-left:auto;margin-right:auto;margin-bottom:14px}
.upsell-price-item{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:10px 6px;text-align:center}
.upsell-price-name{font-size:11px;color:rgba(255,255,255,0.75);margin-bottom:4px}
.upsell-price-amt{font-size:16px;font-weight:700;color:var(--gold2);font-family:'Noto Serif TC',serif}
.upsell-price-type{font-size:9px;color:rgba(255,255,255,0.5);margin-top:2px}
.btn-upsell{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--text);border:none;padding:11px 32px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Serif TC',serif;letter-spacing:2px;text-decoration:none}

</style>
</head>
<body>
<div class="page">

<div class="form-section">
  <div class="form-title">✦ 紫微斗數命盤起盤</div>
  <div class="form-grid">
    <div class="form-group"><label>姓名</label><input id="iName" placeholder="請輸入姓名"></div>
    <div class="form-group"><label>性別</label>
      <select id="iGender"><option value="">請選擇</option><option value="男">男</option><option value="女">女</option></select>
    </div>
    <div class="form-group"><label>曆法</label>
      <div class="cal-toggle"><button class="cal-btn active" id="btnSolar" onclick="setCalType('solar')">西曆</button><button class="cal-btn" id="btnLunar" onclick="setCalType('lunar')">農曆</button></div>
    </div>
    <div class="form-group"><label>年份</label><select id="iYear"></select></div>
    <div class="form-group"><label>月份</label>
      <select id="iMonth"><option value="">月</option>
      <option value="1">01月</option><option value="2">02月</option><option value="3">03月</option>
      <option value="4">04月</option><option value="5">05月</option><option value="6">06月</option>
      <option value="7">07月</option><option value="8">08月</option><option value="9">09月</option>
      <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
      </select>
    </div>
    <div class="form-group"><label>日期</label><select id="iDay"><option value="">日</option></select></div>
    <div class="form-group full"><label>出生時辰</label>
      <select id="iHour"><option value="">請選擇時辰</option>
      <option value="子">00:00~00:59 (早子)</option>
      <option value="丑">01:00~02:59 (丑)</option>
      <option value="寅">03:00~04:59 (寅)</option>
      <option value="卯">05:00~06:59 (卯)</option>
      <option value="辰">07:00~08:59 (辰)</option>
      <option value="巳">09:00~10:59 (巳)</option>
      <option value="午">11:00~12:59 (午)</option>
      <option value="未">13:00~14:59 (未)</option>
      <option value="申">15:00~16:59 (申)</option>
      <option value="酉">17:00~18:59 (酉)</option>
      <option value="戌">19:00~20:59 (戌)</option>
      <option value="亥">21:00~22:59 (亥)</option>
      <option value="子">23:00~23:59 (晚子)</option>
      </select>
    </div>
    <div class="form-group full"><button class="btn-gen" onclick="onGenerate()">✦ 立即起盤</button></div>
  </div>
</div>

<div class="chart-section" id="chartSection">
  <div class="chart-header" id="chartHeader">命盤</div>
  <div class="chart-wrap"><div class="mingpan" id="mingpan"></div></div>
  <div class="info-bar" id="infoBar"></div>
  <div class="dx-section"><div class="dx-title">◈ 大限排列</div><div class="dx-grid" id="dxGrid"></div></div>
  <div class="reading" id="reading"></div>

  <div id="paidReading" style="display:none"></div>
  <div class="palace-table" id="palaceTable" style="display:none">
    <div class="palace-table-title">◈ 星曜宮位對照</div>
    <div class="pt-grid" id="ptGrid"></div>
  </div>
  <div class="upsell-section" id="upsellSection" style="display:none">
    <div class="upsell-teaser">
      <div class="upsell-teaser-title" id="upsellTitle">【命宮論賦性】你的命格解析</div>
      <div class="upsell-teaser-text" id="upsellTeaser"></div>
      <div class="upsell-blur" id="upsellBlur">命宮主星深藏的潛力、感情路的模式、財運的規律、事業發展的方向……以及你這一生最需要突破的課題，深度解盤將一一為你揭示。你的每顆星在每個宮位的交叉影響，都蘊藏著獨一無二的人生密碼。</div>
    </div>
    <div class="upsell-cta">
      <div class="upsell-cta-title">✦ 深度解盤 · 風水指引 · 每日穿搭</div>
      <div class="upsell-cta-sub">解鎖完整十二宮詳析、每日色彩穿搭指引、風水植物方位建議</div>
      <div class="upsell-price-grid">
        <div class="upsell-price-item"><div class="upsell-price-name">深度解盤</div><div class="upsell-price-amt">$68</div><div class="upsell-price-type">CAD 一次性</div></div>
        <div class="upsell-price-item"><div class="upsell-price-name">每日穿搭</div><div class="upsell-price-amt">$19</div><div class="upsell-price-type">CAD /月</div></div>
        <div class="upsell-price-item"><div class="upsell-price-name">風水方位</div><div class="upsell-price-amt">$48</div><div class="upsell-price-type">CAD 一次性</div></div>
      </div>
      <button class="btn-upsell" onclick="window.location.href='ziwei_website.html'">✦ 了解更多</button>
    </div>
  </div>
</div>

</div>

function solarToLunar(sy,sm,sd){
  for(const ly of [sy, sy-1]){
    const rec=LY[ly]; if(!rec) continue;
    const [cm,cd,mb,lm,mc]=rec;
    const cny=Date.UTC(ly,cm-1,cd);
    const diff=Math.round((Date.UTC(sy,sm-1,sd)-cny)/86400000);
    if(diff<0) continue;
    let month=1,cum=0,leapUsed=false;
    const tg='甲乙丙丁戊己庚辛壬癸'[(ly-4)%10];
    const dz='子丑寅卯辰巳午未申酉戌亥'[(ly-4)%12];
    for(let i=0;i<mc;i++){
      const days=((mb>>(12-i))&1)?30:29;
      if(diff<cum+days) return{yearTG:tg,yearDZ:dz,month,day:diff-cum+1};
      cum+=days;
      if(lm>0&&month===lm&&!leapUsed) leapUsed=true;
      else month++;
    }
  }
  return null;
}

// 格子順序（4×4，中央2×2）
const GRID=['巳','午','未','申','辰',null,null,'酉','卯',null,null,'戌','寅','丑','子','亥'];

// ═══════════════════════════════════════════
// 起盤核心
// ═══════════════════════════════════════════
function generateChart(p){
  const{ytg,ydz,lm,ld,h,gender,name}=p;
  const mg=getMG(lm,h), sg=getSG(lm,h);
  const mgGan=getPG(ytg,mg);
  const ju=WX[WXG[ytg]]?.[mg]||0;
  const zwDZ=ZW[ju]?.[ld-1];
  const tfDZ=TF_ZW[zwDZ];
  const yg=YG[ytg]||{};
  const hs=getHourStars(h,ydz);
  const ms={};
  Object.entries(MS).forEach(([k,v])=>ms[k]=v[lm-1]);

  // 建宮
  const pal={};
  DZ.forEach((d,i)=>pal[d]={name:PAL[((dzi(mg)-i)+12)%12],stars:[],sub:[],sihua:{}});

  // 安主星
  const zwS=ZW_SYS[zwDZ]||{}, tfS=TF_SYS[tfDZ]||{};
  [...Object.entries(zwS),...Object.entries(tfS)].forEach(([s,loc])=>{if(loc&&pal[loc])pal[loc].stars.push(s);});
  DZ.forEach(d=>{pal[d].stars=[...new Set(pal[d].stars)];});

  // 安輔星
  Object.entries(hs).forEach(([s,loc])=>{if(loc&&pal[loc])pal[loc].sub.push(s);});
  Object.entries(ms).forEach(([s,loc])=>{if(loc&&pal[loc])pal[loc].sub.push(s);});
  ['祿存','擎羊','陀羅','天魁','天鉞'].forEach(k=>{if(yg[k]&&pal[yg[k]])pal[yg[k]].sub.push(k);});

  // 四化
  ['化祿','化權','化科','化忌'].forEach(sh=>{
    const sn=yg[sh];if(!sn)return;
    DZ.forEach(d=>{if(pal[d].stars.includes(sn))pal[d].sihua[sn]=sh;});
  });
  if(yg.化忌2) DZ.forEach(d=>{if(pal[d].stars.includes(yg.化忌2))pal[d].sihua[yg.化忌2]='化忌';});
  if(sg&&pal[sg]) pal[sg].sub.push('(身)');

  // 大限
  const yangTGidx=TG.indexOf(ytg);
  const isYangYear=yangTGidx%2===0;
  const isYMYF=(gender==='男'&&isYangYear)||(gender==='女'&&!isYangYear);
  const dxArr=Array.from({length:12},(_,i)=>{
    const di=isYMYF?((dzi(mg)-i+12)%12):((dzi(mg)+i)%12);
    return{dz:DZ[di],s:ju+i*10,e:ju+i*10+9};
  });
  dxArr.forEach(dx=>{if(pal[dx.dz])pal[dx.dz].dx=`${dx.s}~${dx.e}`;});

  return{mg,mgGan,sg,ju,zwDZ,tfDZ,pal,dxArr,yg,mingZhu:MZ[mg],shenZhu:SZ[ydz],name,ytg,ydz,lm,ld,h,gender};
}

// ═══════════════════════════════════════════
// 渲染
// ═══════════════════════════════════════════
function renderChart(r){
  const{mg,mgGan,sg,ju,zwDZ,tfDZ,pal,dxArr,yg,mingZhu,shenZhu,name,ytg,ydz,lm,ld,h,gender}=r;
  let html='';
  // Grid positions: explicit placement for correct 4x4 layout
  const GRID_POS={
    '巳':{c:1,r:1},'午':{c:2,r:1},'未':{c:3,r:1},'申':{c:4,r:1},
    '辰':{c:1,r:2},'酉':{c:4,r:2},
    '卯':{c:1,r:3},'戌':{c:4,r:3},
    '寅':{c:1,r:4},'丑':{c:2,r:4},'子':{c:3,r:4},'亥':{c:4,r:4},
  };
  GRID.forEach((d,idx)=>{
    if(d===null&&idx===5){
      const shHTML=['化祿','化權','化科','化忌'].map(sh=>{
        const sn=yg[sh];if(!sn)return'';
        const cls=sh==='化祿'?'lu':sh==='化權'?'quan':sh==='化科'?'ke':'ji';
        return`<span class="sh-item ${cls}">${sn}${sh.slice(1)}</span>`;
      }).join('');
      const shHTML2=yg.化忌2?`<span class="sh-item ji">${yg.化忌2}忌</span>`:'';
      html+=`<div class="center-info">
        <div class="c-title">◈ 命盤資料 ◈</div>
        <div class="c-row"><span>姓名：</span>${name}　<span>性別：</span>${gender}</div>
        <div class="c-row"><span>農曆：</span>${ytg}${ydz}年${lm}月${ld}日${h}時</div>
        <div class="c-row"><span>命宮：</span>${mgGan}${mg} <span class="c-ju">${JU[ju]}</span></div>
        <div class="c-row"><span>身宮：</span>${sg}　<span>紫微在：</span>${zwDZ}</div>
        <div class="c-row"><span>命主：</span>${mingZhu}　<span>身主：</span>${shenZhu}</div>
        <div class="c-sihua">${shHTML}${shHTML2}</div>
      </div>`;
    }else if(d===null){return;}
    else{
      const p=pal[d];
      const isMing=d===mg, isShen=d===sg&&d!==mg;
      const mainHTML=p.stars.map(s=>{
        const sh=p.sihua[s];
        const scls=sh==='化祿'?'lu':sh==='化權'?'quan':sh==='化科'?'ke':sh==='化忌'?'ji':'';
        const badge=sh?`<span class="sh-badge sh-${sh==='化祿'?'lu':sh==='化權'?'quan':sh==='化科'?'ke':'ji'}">${sh.slice(1)}</span>`:'';
        return`<span class="star ${scls}">${s}${badge}</span>`;
      }).join(' ');
      const pos=GRID_POS[d]||{c:1,r:1};
      html+=`<div class="palace${isMing?' ming-pal':''}" style="grid-column:${pos.c};grid-row:${pos.r}">
        <div class="p-stars">${mainHTML}</div>
        <div class="p-sub">${p.sub.join(' ')}</div>
        <div class="p-bottom">
          <span class="p-name">${p.name}${isShen?'<span class="tag-shen" style="font-size:8px;margin-left:2px">身</span>':''}</span>
          <span class="p-dz">${d}</span>
        </div>
        ${p.dx?`<div class="p-dx">${p.dx}</div>`:''}
        ${isMing?'<div class="tag-ming">命</div>':''}
      </div>`;
    }
  });
  return html;
}

function doGenerate(name,gender,isSolar,year,month,day,hour){
  let ytg,ydz,lm,ld;
  if(isSolar){
    const lunar=solarToLunar(year,month,day);
    ytg=lunar.yearTG; ydz=lunar.yearDZ; lm=lunar.month; ld=lunar.day;
  } else {
    ytg=TG[(year-4)%10]; ydz=DZ[(year-4)%12]; lm=month; ld=day;
  }

  const result=generateChart({ytg,ydz,lm,ld,h:hour,gender,name});

  // ── 需求1: 格式化標題 ──
  const solarStr=isSolar?`西元 ${year}年${String(month).padStart(2,'0')}月${String(day).padStart(2,'0')}日`:`農曆 ${year}年${String(month).padStart(2,'0')}月${String(day).padStart(2,'0')}日`;
  const lunarStr=`農曆 ${ytg}${ydz}年${lm}月${ld}日`;
  const hourSel=document.getElementById('iHour');
  const hourTxt=hourSel.options[hourSel.selectedIndex].text;
  document.getElementById('chartHeader').innerHTML=`
    <div style="font-size:17px;font-weight:700;letter-spacing:3px">${name} <span style="font-size:13px;opacity:0.85">（${gender}）</span></div>
    <div style="font-size:12px;opacity:0.85;margin-top:3px;font-weight:400">${isSolar?solarStr:''} ${isSolar?hourTxt:''}</div>
    <div style="font-size:12px;opacity:0.85;font-weight:400">${lunarStr} ${hourTxt}</div>
  `;
  document.getElementById('mingpan').innerHTML=renderChart(result);

  // Info bar
  const{mg,mgGan,ju,mingZhu,shenZhu,zwDZ,tfDZ,yg}=result;
  document.getElementById('infoBar').innerHTML=`
    <div class="info-card"><div class="lbl">命宮</div><div class="val">${mgGan}${mg}</div></div>
    <div class="info-card"><div class="lbl">五行局</div><div class="val" style="font-size:11px">${JU[ju]}</div></div>
    <div class="info-card"><div class="lbl">命主/身主</div><div class="val" style="font-size:11px">${mingZhu}/${shenZhu}</div></div>
    <div class="info-card"><div class="lbl">紫微/天府</div><div class="val" style="font-size:11px">${zwDZ}/${tfDZ}</div></div>
  `;

  // Daxian
  document.getElementById('dxGrid').innerHTML=result.dxArr.map(dx=>
    `<div class="dx-item">${dx.dz} ${dx.s}~${dx.e}歲</div>`).join('');

  // 簡短解說
  const mainStar=result.pal[mg].stars[0];
  const desc=STAR_DESC[mainStar]||'';
  const colData=COLOUR_DATA[mainStar];
  // Draw a segmented circle SVG for colour swatches
  function makeCircle(colours, size=32){
    const n=colours.length, r=size/2, cx=r, cy=r;
    if(n===1){
      return`<svg width="${size}" height="${size}" style="vertical-align:middle;margin-right:6px"><circle cx="${cx}" cy="${cy}" r="${r-1}" fill="${colours[0]}" stroke="rgba(0,0,0,0.15)" stroke-width="1"/></svg>`;
    }
    const angle=360/n;
    let paths='';
    colours.forEach((col,i)=>{
      const a1=(i*angle-90)*Math.PI/180, a2=((i+1)*angle-90)*Math.PI/180;
      const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
      const x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
      const large=angle>180?1:0;
      paths+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} Z" fill="${col}" stroke="white" stroke-width="0.8"/>`;
    });
    return`<svg width="${size}" height="${size}" style="vertical-align:middle;margin-right:6px"><g>${paths}</g><circle cx="${cx}" cy="${cy}" r="${r-0.5}" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1"/></svg>`;
  }

  const colCircle=colData?makeCircle(colData.c,36):'';
  const avoidStar=yg['化忌'];
  const avoidCol=COLOUR_DATA[avoidStar];
  const avoidCircle=avoidCol&&avoidCol.avoid?makeCircle(avoidCol.avoid,30):'';

  // ── 免費版：所有主星列表 ──
  const ALL_MAIN=['紫微','天機','太陽','武曲','天同','廉貞','天府','太陰','貪狼','巨門','天相','天梁','七殺','破軍'];
  const starPalaceMap={};
  DZ.forEach(d=>{
    result.pal[d].stars.forEach(s=>{
      if(ALL_MAIN.includes(s)) starPalaceMap[s]={palace:result.pal[d].name,dz:d,sihua:result.pal[d].sihua[s]||null};
    });
  });

  const starRows=ALL_MAIN.map(s=>{
    const info=starPalaceMap[s];
    if(!info) return '';
    const sh=info.sihua;
    const shBg=sh==='化祿'?'background:#e8f5e9;color:#2e7d32':sh==='化權'?'background:#fff3e0;color:#e65100':sh==='化科'?'background:#e3f2fd;color:#1565c0':sh==='化忌'?'background:#fce4ec;color:#b71c1c':'';
    const shBadge=sh?`<span style="font-size:10px;padding:1px 5px;border-radius:8px;margin-left:4px;${shBg}">${sh}</span>`:'';
    const colD=COLOUR_DATA[s];
    const circle=colD?makeCircle(colD.c,18):'';
    return`<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-bottom:1px solid rgba(180,140,220,0.15);flex-wrap:wrap">
      <div style="min-width:48px;font-weight:700;color:#5B3A8C;font-size:13px">${s}${shBadge}</div>
      <div style="flex:1;min-width:160px">
        <span style="font-size:11px;color:#9370BB;background:rgba(180,140,220,0.12);padding:1px 7px;border-radius:10px;margin-right:6px">${info.palace}（${info.dz}）</span>
        <span style="font-size:12px;color:#4a3060;line-height:1.6">${STAR_DESC[s]||''}</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:#7B5AB8;white-space:nowrap">${circle}${colD?colD.label:''}</div>
    </div>`;
  }).join('');

  const jiItems=ALL_MAIN.filter(s=>starPalaceMap[s]&&starPalaceMap[s].sihua==='化忌').map(s=>{
    const colD=COLOUR_DATA[s];
    const avoidC=colD&&colD.avoid?makeCircle(colD.avoid,16):'';
    return`<div style="font-size:12px;color:#8B1A1A;padding:3px 0">⚠️ <strong>${s}化忌</strong>（在${starPalaceMap[s].palace}）：${colD&&colD.avoid?`宜避開 ${avoidC} ${colD.avoidLabel||'該配色'}`:''} ${colD&&colD.extra?`・${colD.extra}`:''}</div>`;
  }).join('');

  document.getElementById('reading').innerHTML=`
    <div style="padding:4px 0 12px">
      <div style="font-family:'Noto Serif TC',serif;font-size:14px;font-weight:700;color:#5B3A8C;letter-spacing:2px;padding:0 0 8px;border-bottom:1px solid rgba(180,140,220,0.3);margin-bottom:8px">✦ 命盤主星一覽（免費預覽）</div>
      ${starRows}
      ${jiItems?`<div style="margin-top:12px;padding:10px 12px;background:rgba(255,220,220,0.15);border-radius:8px;border-left:3px solid #c0392b"><div style="font-size:12px;font-weight:700;color:#8B1A1A;margin-bottom:4px">本命四化忌提示</div>${jiItems}</div>`:''}
      <div style="margin-top:14px;padding:10px 12px;background:rgba(180,140,220,0.08);border-radius:8px;font-size:12px;color:#7B5AB8;text-align:center">🔓 解鎖深度解盤，查看十二宮詳細分析 · 四化影響 · 健康提示</div>
    </div>
  `;

  // ── 付費版詳細解說 ──
  generatePaidReading(result, yg, mg);

  // ── 需求4: 星宮對照表 ──
  buildPalaceTable(result, mg);

  // ── 需求5: Upsell section ──
  buildUpsell(result, mg, name, gender);

  document.getElementById('chartSection').classList.add('show');
  setTimeout(()=>document.getElementById('chartSection').scrollIntoView({behavior:'smooth'}),100);
}

// ── 星宮對照表 ──
function buildPalaceTable(result, mg){
  const ALL_MAIN=['紫微','天機','太陽','武曲','天同','廉貞','天府','太陰','貪狼','巨門','天相','天梁','七殺','破軍'];
  const PAL_ORDER=['命宮','兄弟','夫妻','子女','財帛','疾厄','遷移','部屬','事業','田宅','福德','父母'];
  // build palace→stars map
  const palMap={};
  PAL_ORDER.forEach(p=>palMap[p]={stars:[],sihua:{},dz:''});
  DZ.forEach(d=>{
    const p=result.pal[d];
    palMap[p.name]={stars:p.stars.filter(s=>ALL_MAIN.includes(s)),sihua:{...p.sihua},dz:d};
  });
  const shCls={化祿:'lu',化權:'quan',化科:'ke',化忌:'ji'};
  const shTag={化祿:'祿',化權:'權',化科:'科',化忌:'忌'};
  // Row 1: palace names
  const palHeaders=PAL_ORDER.map(palName=>{
    const isMing=palName==='命宮';
    return`<div class="pt-pal-cell"><div class="pt-pal" style="${isMing?'color:var(--gold);':''}">${palName}</div></div>`;
  }).join('');
  // Row 2+: stars (find max star count to determine rows needed)
  const palStars=PAL_ORDER.map(palName=>{
    const info=palMap[palName];
    return info.stars.map(s=>{
      const sh=info.sihua[s];
      const cls=sh?shCls[sh]:'';
      const tag=sh?`<span class="pt-star-tag ${cls}" style="font-size:7px">${shTag[sh]}</span>`:'';
      return`<div class="pt-star-name ${cls}">${s}${tag}</div>`;
    });
  });
  const maxRows=Math.max(...palStars.map(a=>a.length),1);
  let starRowsHtml='';
  for(let r=0;r<maxRows;r++){
    const rowCells=palStars.map(stars=>{
      const star=stars[r]||'';
      return`<div class="pt-cell">${star||''}</div>`;
    }).join('');
    starRowsHtml+=`<div style="display:contents">${rowCells}</div>`;
  }
  document.getElementById('ptGrid').innerHTML=
    `<div style="display:contents">${palHeaders}</div>${starRowsHtml}`;
  document.getElementById('palaceTable').style.display='block';
}

function generatePaidReading(result, yg, mg){
  const PAL_ORDER=['命宮','兄弟','夫妻','子女','財帛','疾厄','遷移','部屬','事業','田宅','福德','父母'];

    }).join('');

    const emptyNote=mainStars.length===0?`<div style="font-size:12px;color:#9370BB;font-style:italic;padding:8px">本宮無主星坐守，受鄰宮及對宮影響為主。</div>`:'';

    const subStarsList=subStars.length?`<div style="font-size:11px;color:#9370BB;margin-top:6px">輔星：${subStars.map(s=>{
      const sh=info.sihua[s];
      return s+(sh?`<span style="font-size:10px;padding:0 4px;border-radius:6px;background:${sihuaBg[sh]};margin-left:2px">${sh}</span>`:'');
    }).join('、')}</div>`:'';

    return`<div style="margin-bottom:16px;border:1px solid rgba(180,140,220,0.25);border-radius:12px;overflow:hidden">
      <div style="background:linear-gradient(135deg,#5B3A8C,#3D2060);padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <span style="font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;color:#E8C97A;letter-spacing:2px">${palName}</span>
          <span style="font-size:11px;color:rgba(255,255,255,0.6);margin-left:8px">${info.dz}宮</span>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:rgba(255,255,255,0.7)">${meaning.main}</div>
          ${meaning.ext?`<div style="font-size:10px;color:rgba(255,255,255,0.45)">${meaning.ext}</div>`:''}
        </div>
      </div>
      <div style="padding:12px 14px;background:#fffdf8">
        ${starAnalysis}
        ${emptyNote}
        ${subStarsList}
      </div>
    </div>`;
  }).join('');

  const html=`
    <div style="margin-top:16px;border:2px solid #C9A84C;border-radius:14px;overflow:hidden">
      <div style="background:linear-gradient(135deg,#3D2060,#5B3A8C);padding:16px 18px">
        <div style="font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;color:#E8C97A;letter-spacing:3px;margin-bottom:4px">✦ 深度解盤報告</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.6)">十二宮詳細分析 · 四化影響 · 宮位意義</div>
      </div>
      <div style="padding:16px;background:#fffdf8">
        <div style="font-family:'Noto Serif TC',serif;font-size:13px;font-weight:700;color:#5B3A8C;margin-bottom:10px;letter-spacing:1px">本命四化</div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px">${sihuaSummary}</div>
        <div style="font-family:'Noto Serif TC',serif;font-size:13px;font-weight:700;color:#5B3A8C;margin-bottom:10px;letter-spacing:1px">十二宮詳細解說</div>
        ${palSections}
      </div>
    </div>
  `;

  document.getElementById('paidReading').innerHTML=html;
  document.getElementById('paidReading').style.display='block';
}
</script>
</body>
</html>
